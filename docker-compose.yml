# ============================================================
# wacrm — orquestração local/produção via Docker Compose.
# Banco = Supabase gerenciado (externo). Só o app Next sobe aqui.
# Env vem do arquivo .env.local (não versionado).
# ============================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # Vars públicas precisam entrar no build (inline no bundle).
      # Interpoladas do env-file passado ao compose (ver instruções).
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
    image: wacrm:latest
    container_name: wacrm
    restart: unless-stopped
    # Bind só no localhost por padrão (BIND_ADDR=0.0.0.0 expõe na LAN).
    # Cloudflare Tunnel fala com app:3000 pela rede interna do compose,
    # então localhost-only não quebra o tunnel e nada vaza nas interfaces
    # públicas do host. APP_PORT muda a porta do host.
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${APP_PORT:-10300}:3000"
    # Lê todas as variáveis (Supabase, Meta, ENCRYPTION_KEY, etc.)
    # do arquivo de ambiente — mesmo formato do .env.local.example.
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production

  # Scheduler interno — pinga os endpoints de cron (broadcast agendado +
  # automations + flows) em loop SEQUENCIAL (curl aguarda a resposta, então
  # não há ticks sobrepostos). Usa AUTOMATION_CRON_SECRET (mesmo secret dos 3
  # crons) via header x-cron-secret. Fala com app:3000 pela rede interna —
  # nada na internet. CRON_INTERVAL (default 60s) controla a cadência.
  # $$VAR escapa para $VAR no shell do container (lê o env em runtime).
  cron:
    image: curlimages/curl:latest
    container_name: wacrm-cron
    restart: unless-stopped
    depends_on:
      - app
    environment:
      - AUTOMATION_CRON_SECRET=${AUTOMATION_CRON_SECRET:-}
      - CRON_INTERVAL=${CRON_INTERVAL:-60}
      # Cadência dedicada do agente de IA: bem mais curta que os demais crons
      # para a resposta sair quase em tempo real (latência ≈ debounce + isto).
      - AI_AGENT_CRON_INTERVAL=${AI_AGENT_CRON_INTERVAL:-8}
    entrypoint:
      - /bin/sh
      - -c
      - |
        # Loop RÁPIDO dedicado ao agente de IA (resposta quase em tempo real).
        ( while true; do
            curl -fsS -m 30 -H "x-cron-secret: $$AUTOMATION_CRON_SECRET" "http://app:3000/api/ai-agent/cron" >/dev/null 2>&1 || true
            sleep "$$AI_AGENT_CRON_INTERVAL"
          done ) &
        # Loop PADRÃO para os demais crons (broadcasts, automations, flows,
        # conversations — sweep de desatribuição de conversa ociosa;
        # transcriptions — retry da transcrição de áudio).
        while true; do
          for p in broadcasts automations flows conversations transcriptions; do
            curl -fsS -m 30 -H "x-cron-secret: $$AUTOMATION_CRON_SECRET" "http://app:3000/api/$$p/cron" >/dev/null 2>&1 || true
          done
          sleep "$$CRON_INTERVAL"
        done

  # Cloudflare Tunnel — expõe o app num domínio sem abrir portas.
  # Só sobe com o profile "tunnel" (quando há CF_TUNNEL_TOKEN).
  # No dashboard Zero Trust, aponte o public hostname → http://app:3000
  # (mesma rede do compose, porta interna do container).
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: wacrm-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN:-}
    depends_on:
      - app
    profiles:
      - tunnel
